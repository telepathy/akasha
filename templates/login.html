<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Akasha</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color, #f5f5f5);
        }
        .login-box {
            background: var(--card-bg, white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 360px;
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-box .form-group {
            margin-bottom: 20px;
        }
        .login-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .login-box input:focus {
            outline: none;
            border-color: #2196F3;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #1976D2;
        }
        .login-box .error {
            color: #f44336;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .login-box .logo-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-icon">📦</div>
            <h1>Akasha</h1>
            <p class="subtitle">依赖管理系统</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入管理员密码" required autofocus>
                </div>
                <button type="submit">登录</button>
                <div id="errorMsg" class="error"></div>
            </form>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            fetch('/api/v1/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || '密码错误';
                }
            })
            .catch(() => {
                errorMsg.textContent = '登录失败，请重试';
            });
        }
    </script>
</body>
</html>
