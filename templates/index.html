<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>依赖管理系统 - Akasha</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">📦 Akasha</div>
            <nav class="nav">
                <a href="/" class="nav-item active">首页</a>
                <a href="/branches" class="nav-item">分支管理</a>
                <a href="/compare" class="nav-item">分支比较</a>
                <a href="/merge" class="nav-item">分支合并</a>
            </nav>
            <div class="branch-selector">
                <select id="currentBranch" onchange="switchBranch(this.value)">
                    <option value="">选择分支</option>
                </select>
            </div>
        </aside>
        <main class="main">
            <div class="page-header">
                <h1>依赖管理系统</h1>
                <p>管理 Java 项目的 Gradle 依赖版本</p>
            </div>
            <div class="content">
                <div class="card">
                    <h3>分支列表</h3>
                    <div id="branchList" class="list">加载中...</div>
                </div>
                <div class="card">
                    <h3>最新依赖</h3>
                    <div id="depList" class="list">请先选择分支</div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        async function init() { await loadBranches(); }
        init();
    </script>
</body>
</html>
