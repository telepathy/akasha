<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分支合并 - Akasha</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                📦 Akasha
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/branches" class="nav-item">分支管理</a>
                <a href="/compare" class="nav-item">分支比较</a>
                <a href="/merge" class="nav-item active">分支合并</a>
            </nav>
        </aside>
        <main class="main">
            <div class="merge-header">
                <h1>分支合并</h1>
                <p>将源分支的依赖合并到目标分支，支持多种合并策略</p>
            </div>
            
            <div class="merge-config">
                <div class="branch-group">
                    <label>源分支（从）</label>
                    <select id="sourceBranch">
                        <option value="">选择源分支...</option>
                    </select>
                </div>
                <div class="merge-arrow">→</div>
                <div class="branch-group">
                    <label>目标分支（合并到）</label>
                    <select id="targetBranch">
                        <option value="">选择目标分支...</option>
                    </select>
                </div>
            </div>
            
            <div class="strategy-section">
                <h3>合并策略</h3>
                <div class="strategy-options">
                    <button class="strategy-btn active" data-strategy="keep_higher" onclick="selectStrategy(this)">
                        <span class="icon">📈</span>保留较高版本
                    </button>
                    <button class="strategy-btn" data-strategy="force_source" onclick="selectStrategy(this)">
                        <span class="icon">🔄</span>强制使用源版本
                    </button>
                    <button class="strategy-btn" data-strategy="force_target" onclick="selectStrategy(this)">
                        <span class="icon">📌</span>保留目标版本
                    </button>
                </div>
                <div class="options-row">
                    <div class="checkbox-group">
                        <input type="checkbox" id="addMissing" checked>
                        <label for="addMissing">添加目标分支缺少的依赖</label>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="preview-btn" onclick="previewMerge()">
                    👁️ 预览合并
                </button>
                <button class="execute-btn" onclick="executeMerge()" id="executeBtn" disabled>
                    ✚ 执行合并
                </button>
            </div>
            
            <div id="resultArea">
                <div class="empty-state">
                    <div class="icon">🔀</div>
                    <p>选择分支并预览合并结果</p>
                    <p style="font-size:14px;">预览不会修改数据，可安全查看</p>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let branches = [];
        let currentStrategy = 'keep_higher';
        let lastPreview = null;
        
        async function loadBranches() {
            try {
                const resp = await fetch('/api/v1/branches');
                branches = await resp.json();
                
                const sourceSelect = document.getElementById('sourceBranch');
                const targetSelect = document.getElementById('targetBranch');
                
                branches.forEach(b => {
                    if (b.status === 'deleted') return;
                    
                    const label = b.name + (b.status === 'archived' ? ' (已锁定)' : '');
                    sourceSelect.add(new Option(label, b.name));
                    
                    if (b.status === 'active') {
                        targetSelect.add(new Option(b.name, b.name));
                    }
                });
            } catch (e) {
                console.error('Failed to load branches:', e);
            }
        }
        
        function selectStrategy(btn) {
            document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStrategy = btn.dataset.strategy;
        }
        
        function getMergeConfig() {
            const source = document.getElementById('sourceBranch').value;
            const target = document.getElementById('targetBranch').value;
            const addMissing = document.getElementById('addMissing').checked;
            
            if (!source || !target) {
                alert('请选择源分支和目标分支');
                return null;
            }
            if (source === target) {
                alert('源分支和目标分支不能相同');
                return null;
            }
            
            return { source, target, strategy: currentStrategy, addMissing };
        }
        
        async function previewMerge() {
            const config = getMergeConfig();
            if (!config) return;
            
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>正在分析合并影响...</span>
                </div>
            `;
            
            try {
                const resp = await fetch('/api/v1/branches/' + config.source + '/merge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        targetBranch: config.target,
                        strategy: config.strategy,
                        addMissing: config.addMissing,
                        dryRun: true
                    })
                });
                const data = await resp.json();
                
                if (data.error) {
                    resultArea.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">❌</div>
                            <p>预览失败</p>
                            <p style="font-size:14px;">${data.error}</p>
                        </div>
                    `;
                    return;
                }
                
                lastPreview = { config, result: data.result };
                renderResult(data.result, true, config);
                document.getElementById('executeBtn').disabled = false;
            } catch (e) {
                resultArea.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>请求失败</p>
                        <p style="font-size:14px;">${e.message}</p>
                    </div>
                `;
            }
        }
        
        async function executeMerge() {
            if (!lastPreview) {
                alert('请先预览合并');
                return;
            }
            
            if (!confirm('确定执行合并？此操作将修改目标分支的依赖数据。')) {
                return;
            }
            
            const config = lastPreview.config;
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>正在执行合并...</span>
                </div>
            `;
            
            try {
                const resp = await fetch('/api/v1/branches/' + config.source + '/merge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        targetBranch: config.target,
                        strategy: config.strategy,
                        addMissing: config.addMissing,
                        dryRun: false
                    })
                });
                const data = await resp.json();
                
                if (data.error) {
                    resultArea.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">❌</div>
                            <p>合并失败</p>
                            <p style="font-size:14px;">${data.error}</p>
                        </div>
                    `;
                    return;
                }
                
                renderResult(data.result, false, config);
                document.getElementById('executeBtn').disabled = true;
                lastPreview = null;
            } catch (e) {
                resultArea.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>请求失败</p>
                        <p style="font-size:14px;">${e.message}</p>
                    </div>
                `;
            }
        }
        
        function renderResult(result, isPreview, config) {
            const resultArea = document.getElementById('resultArea');
            const strategyNames = {
                'keep_higher': '保留较高版本',
                'force_source': '强制使用源版本',
                'force_target': '保留目标版本'
            };
            
            let html = `
                <div class="result-section">
                    <div class="result-header">
                        <h3>${config.source} → ${config.target} (${strategyNames[config.strategy]})</h3>
                        <span class="result-badge ${isPreview ? 'badge-preview' : 'badge-executed'}">
                            ${isPreview ? '预览' : '已执行'}
                        </span>
                    </div>
                    <div class="result-stats">
                        <div class="stat-card stat-added">
                            <div class="number">${result.added}</div>
                            <div class="label">新增</div>
                        </div>
                        <div class="stat-card stat-updated">
                            <div class="number">${result.updated}</div>
                            <div class="label">更新</div>
                        </div>
                        <div class="stat-card stat-skipped">
                            <div class="number">${result.skipped}</div>
                            <div class="label">跳过</div>
                        </div>
                        <div class="stat-card stat-conflicts">
                            <div class="number">${result.conflicts ? result.conflicts.length : 0}</div>
                            <div class="label">冲突</div>
                        </div>
                    </div>
            `;
            
            if (result.details && result.details.length > 0) {
                html += `
                    <div class="result-details">
                        <h4>变更详情</h4>
                        <div class="detail-list">
                `;
                result.details.forEach(detail => {
                    let cls = 'detail-skipped';
                    if (detail.startsWith('添加')) cls = 'detail-added';
                    else if (detail.startsWith('更新')) cls = 'detail-updated';
                    html += `<div class="detail-item ${cls}">${detail}</div>`;
                });
                html += `</div></div>`;
            }
            
            if (result.conflicts && result.conflicts.length > 0) {
                html += `
                    <div class="result-details">
                        <h4>冲突列表</h4>
                        <table class="conflict-table">
                            <thead>
                                <tr>
                                    <th>依赖名称</th>
                                    <th>源版本</th>
                                    <th>目标版本</th>
                                    <th>原因</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                result.conflicts.forEach(c => {
                    html += `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.sourceVersion || '-'}</td>
                            <td>${c.targetVersion || '-'}</td>
                            <td class="conflict-reason">${c.reason}</td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
            }
            
            html += `</div>`;
            resultArea.innerHTML = html;
        }
        
        loadBranches();
    </script>
</body>
</html>
