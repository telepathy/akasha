<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分支比较 - Akasha</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                📦 Akasha
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/branches" class="nav-item">分支管理</a>
                <a href="/compare" class="nav-item active">分支比较</a>
                <a href="/merge" class="nav-item">分支合并</a>
            </nav>
            <div class="sidebar-footer">
                <div>Designed with ♥ by Shi Mengjie</div>
                <div>Implemented by Claude Code & Opencode</div>
            </div>
        </aside>
        <main class="main">
            <div class="compare-header">
                <h1>分支比较</h1>
                <div class="branch-selectors">
                    <div class="branch-select-group">
                        <label>源分支</label>
                        <select id="sourceBranch">
                            <option value="">选择分支...</option>
                        </select>
                    </div>
                    <div class="compare-arrow">→</div>
                    <div class="branch-select-group">
                        <label>目标分支</label>
                        <select id="targetBranch">
                            <option value="">选择分支...</option>
                        </select>
                    </div>
                    <button class="compare-btn" onclick="startCompare()" id="compareBtn" disabled>
                        开始比较
                    </button>
                </div>
            </div>
            
            <div id="resultArea">
                <div class="empty-state">
                    <div class="icon">🔀</div>
                    <p>选择两个分支开始比较</p>
                    <p style="font-size:14px;">查看依赖版本差异</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        let branches = [];
        
        async function loadBranches() {
            try {
                const resp = await fetch('/api/v1/branches');
                branches = await resp.json();
                const activeBranches = branches.filter(b => b.status !== 'deleted');
                
                const sourceSelect = document.getElementById('sourceBranch');
                const targetSelect = document.getElementById('targetBranch');
                
                activeBranches.forEach(b => {
                    sourceSelect.add(new Option(b.name, b.name));
                    targetSelect.add(new Option(b.name, b.name));
                });
                
                if (activeBranches.length >= 2) {
                    sourceSelect.value = activeBranches[0].name;
                    targetSelect.value = activeBranches[1].name;
                    updateCompareBtn();
                }
            } catch (e) {
                console.error('Failed to load branches:', e);
            }
        }
        
        function updateCompareBtn() {
            const source = document.getElementById('sourceBranch').value;
            const target = document.getElementById('targetBranch').value;
            document.getElementById('compareBtn').disabled = !source || !target || source === target;
        }
        
        document.getElementById('sourceBranch').addEventListener('change', updateCompareBtn);
        document.getElementById('targetBranch').addEventListener('change', updateCompareBtn);
        
        async function startCompare() {
            const source = document.getElementById('sourceBranch').value;
            const target = document.getElementById('targetBranch').value;
            
            if (!source || !target || source === target) return;
            
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>正在比较分支...</span>
                </div>
            `;
            
            try {
                const resp = await fetch(`/api/v1/dependencies/compare?source=${source}&target=${target}`);
                const data = await resp.json();
                renderDiff(data);
            } catch (e) {
                resultArea.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>比较失败</p>
                        <p style="font-size:14px;">${e.message}</p>
                    </div>
                `;
            }
        }
        
        function renderDiff(data) {
            const resultArea = document.getElementById('resultArea');
            const { diffs, summary } = data;
            
            let html = `
                <div class="summary-cards">
                    <div class="summary-card card-added">
                        <div class="number">${summary.added}</div>
                        <div class="label">新增</div>
                    </div>
                    <div class="summary-card card-removed">
                        <div class="number">${summary.removed}</div>
                        <div class="label">移除</div>
                    </div>
                    <div class="summary-card card-modified">
                        <div class="number">${summary.modified}</div>
                        <div class="label">修改</div>
                    </div>
                    <div class="summary-card card-unchanged">
                        <div class="number">${summary.unchanged}</div>
                        <div class="label">无变化</div>
                    </div>
                </div>
                
                <div class="diff-filters">
                    <button class="filter-btn active" onclick="filterDiffs('all', this)">全部 (${summary.total})</button>
                    <button class="filter-btn" onclick="filterDiffs('added', this)">新增 (${summary.added})</button>
                    <button class="filter-btn" onclick="filterDiffs('removed', this)">移除 (${summary.removed})</button>
                    <button class="filter-btn" onclick="filterDiffs('modified', this)">修改 (${summary.modified})</button>
                    <button class="filter-btn" onclick="filterDiffs('unchanged', this)">无变化 (${summary.unchanged})</button>
                </div>
                
                <div class="diff-table-wrapper">
                    <table class="diff-table">
                        <thead>
                            <tr>
                                <th style="width: 120px;">类型</th>
                                <th style="width: 200px;">依赖名称</th>
                                <th>${data.sourceBranch}</th>
                                <th></th>
                                <th>${data.targetBranch}</th>
                            </tr>
                        </thead>
                        <tbody id="diffBody">
            `;
            
            const sortedDiffs = [...diffs].sort((a, b) => {
                const order = { modified: 0, added: 1, removed: 2, unchanged: 3 };
                return order[a.type] - order[b.type] || a.name.localeCompare(b.name);
            });
            
            sortedDiffs.forEach(diff => {
                const rowClass = diff.type !== 'unchanged' ? `diff-row-${diff.type}` : '';
                const badgeClass = `badge-${diff.type}`;
                const typeLabels = { added: '新增', removed: '移除', modified: '修改', unchanged: '无变化' };
                const typeIcons = { added: '+', removed: '-', modified: '~', unchanged: '=' };
                
                let coordHtml = '';
                if (diff.type === 'modified') {
                    coordHtml = `
                        <td><span class="coord">${diff.sourceCoord}</span></td>
                        <td><span class="arrow-icon">→</span></td>
                        <td><span class="coord">${diff.targetCoord}</span></td>
                    `;
                } else if (diff.type === 'added') {
                    coordHtml = `
                        <td><span class="coord coord-empty">-</span></td>
                        <td><span class="arrow-icon">→</span></td>
                        <td><span class="coord">${diff.targetCoord}</span></td>
                    `;
                } else if (diff.type === 'removed') {
                    coordHtml = `
                        <td><span class="coord">${diff.sourceCoord}</span></td>
                        <td><span class="arrow-icon">→</span></td>
                        <td><span class="coord coord-empty">-</span></td>
                    `;
                } else {
                    coordHtml = `
                        <td><span class="coord">${diff.sourceCoord}</span></td>
                        <td><span class="arrow-icon">=</span></td>
                        <td><span class="coord">${diff.targetCoord}</span></td>
                    `;
                }
                
                html += `
                    <tr class="${rowClass}" data-type="${diff.type}">
                        <td><span class="type-badge ${badgeClass}">${typeIcons[diff.type]} ${typeLabels[diff.type]}</span></td>
                        <td><strong>${diff.name}</strong></td>
                        ${coordHtml}
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            resultArea.innerHTML = html;
        }
        
        function filterDiffs(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.querySelectorAll('#diffBody tr').forEach(row => {
                if (type === 'all' || row.dataset.type === type) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
        
        loadBranches();
    </script>
</body>
</html>
