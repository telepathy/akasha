<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分支管理 - Akasha</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">📦 Akasha</div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/branches" class="nav-item active">分支管理</a>
                
            </nav>
        </aside>
        <main class="main">
            <header class="header">
                <h1>分支管理</h1>
                <button onclick="showCreateBranch()">新建分支</button>
                <button onclick="showImportBranch()">导入分支</button>
            </header>
            <div class="content">
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>基分支</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="branchTable">
                            <tr><td colspan="5">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
    <script>
        loadBranches();
    </script>
</body>
</html>
