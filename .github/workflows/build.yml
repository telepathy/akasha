name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build for amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -o akasha-linux-amd64 cmd/server/main.go

      - name: Build for arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -mod=vendor -o akasha-linux-arm64 cmd/server/main.go

      - name: Make executable
        run: chmod +x akasha-linux-*

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: akasha-binaries
          path: akasha-linux-*
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: akasha-linux-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}