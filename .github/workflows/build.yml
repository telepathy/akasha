name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CGO_ENABLED=0 GOOS=linux go build -mod=vendor -o akasha-${VERSION} cmd/server/main.go
          chmod +x akasha-${VERSION}

      - name: Build docker
        if: false  # Docker 构建待修复
        run: echo "docker build skipped"

      - name: Save docker
        if: false
        run: echo "save skipped"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: akasha-*
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: akasha-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}