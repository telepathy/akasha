name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Go modules
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -mod=vendor -o akasha-${{ steps.version.outputs.version }} cmd/server/main.go
          chmod +x akasha-${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/telepathy/akasha:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: |
          docker save -o akasha-${{ steps.version.outputs.version }}.tar ghcr.io/telepathy/akasha:${{ steps.version.outputs.version }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: akasha-binary
          path: akasha-${{ steps.version.outputs.version }}
          retention-days: 30

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: akasha-docker
          path: akasha-${{ steps.version.outputs.version }}.tar
          retention-days: 30

      - name: Make executable
        run: chmod +x akasha-*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            akasha-*
            akasha-*.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}