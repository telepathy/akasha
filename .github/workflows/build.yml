name: Build and Release

on:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Go modules
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -mod=vendor -o akasha cmd/server/main.go
          chmod +x akasha

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: akasha-binary
          path: akasha
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: false  # Docker Hub 不可用，跳过镜像构建

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/telepathy/akasha:latest

      - name: Save Docker image
        run: |
          docker save -o akasha.tar ghcr.io/telepathy/akasha:latest

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: akasha-docker
          path: akasha.tar
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.draft == false
    permissions:
      contents: write

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: akasha-binary

      - name: Make executable
        run: chmod +x akasha

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: akasha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}