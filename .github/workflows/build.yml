name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build for amd64
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -o akasha-${VERSION}-linux-amd64 cmd/server/main.go
          chmod +x akasha-${VERSION}-linux-amd64

      - name: Build for arm64
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -mod=vendor -o akasha-${VERSION}-linux-arm64 cmd/server/main.go
          chmod +x akasha-${VERSION}-linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-platform Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: akasha:${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Save Docker image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker save -o akasha-${VERSION}.tar akasha:${VERSION}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: akasha-*
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: akasha-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}